{% extends 'saas_admin/base.html' %}
{% block title %}{{ 'Editar empresa' if emp else 'Nova empresa' }}{% endblock %}

{% block content %}
<div style="max-width:540px">
  <h2 style="margin:0 0 1.2rem;font-size:1.2rem">
    {{ 'Editar empresa: ' + emp.nome if emp else 'Nova empresa' }}
  </h2>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Nome <span class="required">*</span></label>
        <input type="text" name="nome" value="{{ emp.nome if emp else '' }}" required />
      </div>
      <div class="form-group">
        <label>Slug (identificador único) <span class="required">*</span></label>
        <input type="text" name="slug" value="{{ emp.slug if emp else '' }}"
               pattern="[a-z0-9\-]+" title="Apenas letras minúsculas, números e hífens" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plano</label>
          <select name="plano_familia">
            <option value="trial" {{ 'selected' if cur_familia == 'trial' else '' }}>trial</option>
            {% for p in familias %}
            <option value="{{ p.slug }}" {{ 'selected' if cur_familia == p.slug else '' }}>{{ p.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select name="plano_tipo">
            <option value="mensal" {{ 'selected' if cur_tipo == 'mensal' else '' }}>Mensal</option>
            <option value="anual" {{ 'selected' if cur_tipo == 'anual' else '' }}>Anual</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            {% for val in ['ativa','suspensa','cancelada'] %}
            <option value="{{ val }}" {{ 'selected' if emp and emp.status == val else '' }}>{{ val }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Trial expira em</label>
        <input type="date" name="trial_ends_at"
               value="{{ emp.trial_ends_at.isoformat() if emp and emp.trial_ends_at else '' }}" />
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" name="telefone" value="{{ emp.telefone if emp else '' }}" />
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" value="{{ emp.email if emp else '' }}" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">{{ 'Salvar' if emp else 'Criar empresa' }}</button>
        <a href="{{ url_for('saas_admin.dashboard') }}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
