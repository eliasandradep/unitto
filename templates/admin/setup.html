<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuração Inicial — Admin Studio Renata Rosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-body admin-body--auth">

  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Renata Rosa" class="auth-card__logo" />
    <h2>Criar conta de administrador</h2>
    <p class="auth-card__subtitle">Nenhum usuário cadastrado. Configure o primeiro acesso.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert--{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin.setup') }}">
      <div class="form-group">
        <label>Nome completo <span class="required">*</span></label>
        <input type="text" name="name" required />
      </div>
      <div class="form-group">
        <label>Nome de usuário <span class="required">*</span></label>
        <input type="text" name="username" required />
      </div>
      <div class="form-group">
        <label>E-mail <span class="required">*</span></label>
        <input type="email" name="email" required />
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" name="phone" />
      </div>
      <div class="form-group">
        <label>Senha <span class="required">*</span></label>
        <input type="password" name="password" required minlength="6" />
      </div>
      <div class="form-group">
        <label>Confirmar senha <span class="required">*</span></label>
        <input type="password" name="confirm" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Criar conta</button>
    </form>
  </div>

</body>
</html>
