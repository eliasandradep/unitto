<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Unitto</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-body admin-body--auth">

  <div class="auth-card">
    <div class="auth-card__logo" style="width:72px;height:72px;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.8rem;font-weight:700;color:#c1904f;font-family:'Jost',sans-serif;letter-spacing:-.02em">U</div>
    <h2 style="margin:.2rem 0 .1rem;font-size:1.3rem;font-weight:700">Unitto</h2>
    <p style="color:#888;font-size:.82rem;margin:0 0 1.2rem">Gestão Unificada</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert--{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin.login') }}">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="username" autofocus required />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="btn-primary btn-full">Entrar</button>
    </form>
  </div>

</body>
</html>
