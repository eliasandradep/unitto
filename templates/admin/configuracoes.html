{% extends 'admin/base.html' %}
{% block title %}Configurações{% endblock %}
{% block page_title %}Configurações{% endblock %}

{% block content %}

<div class="card" style="max-width:640px">
  <div class="card__header">
    <h3>Mensagem de Aniversário</h3>
    <span style="font-size:.78rem;color:var(--text-muted)">Enviada pelo WhatsApp na tela de Aniversariantes</span>
  </div>

  <form method="POST" action="{{ url_for('admin.configuracoes') }}">
    <div class="form-group" style="margin-bottom:1rem">
      <label style="font-size:.82rem;font-weight:500">
        Template da mensagem
        <span style="font-weight:400;color:var(--text-muted)">— use <code>{nome}</code> para personalizar com o nome da cliente</span>
      </label>
      <textarea name="birthday_message" rows="5" maxlength="200"
                style="width:100%;margin-top:.4rem;font-size:.88rem"
                id="bdayMsg">{{ birthday_message }}</textarea>
      <div style="text-align:right;font-size:.75rem;color:var(--text-muted);margin-top:.2rem">
        <span id="charCount">0</span>/200 caracteres
      </div>
    </div>

    <div style="background:var(--bg-sidebar,#f8f5f3);border:1px solid var(--border);border-radius:6px;padding:.7rem .9rem;font-size:.83rem;margin-bottom:1.2rem;color:var(--text-muted)">
      <strong>Prévia:</strong>
      <span id="previewText" style="color:var(--text)"></span>
    </div>

    <div class="form-actions" style="margin-top:0">
      <button type="submit" class="btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar
      </button>
    </div>
  </form>
</div>

<script>
const ta      = document.getElementById('bdayMsg');
const counter = document.getElementById('charCount');
const preview = document.getElementById('previewText');

function update() {
  counter.textContent = ta.value.length;
  preview.textContent = ta.value.replace(/{nome}/g, 'Maria');
}
ta.addEventListener('input', update);
update();
</script>

{% endblock %}
