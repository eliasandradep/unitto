{% extends 'admin/base.html' %}
{% block title %}Novo Lead{% endblock %}
{% block page_title %}Novo Lead{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <form method="POST" action="{{ url_for('admin.lead_new') }}">
    <div class="form-group">
      <label>Telefone / WhatsApp <span class="required">*</span></label>
      <input type="text" name="phone" required placeholder="(00) 00000-0000" />
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" name="name" placeholder="Nome completo" />
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" name="email" />
    </div>
    <div class="form-group">
      <label>Serviço de interesse</label>
      <select name="service">
        <option value="">—</option>
        <option value="mechas">Mechas / Balayage</option>
        <option value="correcao">Correção de Cor</option>
        <option value="coloracao">Coloração Global</option>
        <option value="reconstrucao">Reconstrução Capilar</option>
        <option value="corte">Corte Feminino</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="form-group">
      <label>Unidade</label>
      <select name="unit">
        <option value="">—</option>
        <option value="varginha">Varginha – MG</option>
        <option value="sao_jose">São José dos Campos – SP</option>
      </select>
    </div>
    <div class="form-group">
      <label>Origem</label>
      <select name="source">
        {% for key, label in sources %}
        <option value="{{ key }}" {% if key == 'manual' %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select name="status">
        {% for key, label in statuses %}
        <option value="{{ key }}" {% if key == 'novo' %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Mensagem</label>
      <textarea name="message" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Salvar lead</button>
      <a href="{{ url_for('admin.leads') }}" class="btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
